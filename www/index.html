<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Recall — Study Smarter</title>
<style>
  :root{
    --bg: #0F1115;
    --surface: #1A1D24;
    --surface-2: #22262F;
    --border: #2A2E38;
    --text: #E8E9ED;
    --text-dim: #8B8F9A;
    --accent: #7C6FFF;
    --accent-dim: #7C6FFF33;
    --gold: #FFB74D;
    --green: #4ADE80;
    --red: #F87171;
    --radius: 18px;
    --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-body: system-ui, -apple-system, 'Segoe UI', sans-serif;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  [data-theme="light"]{
    --bg: #F5F4F2;
    --surface: #FFFFFF;
    --surface-2: #EFEEEA;
    --border: #E1DFDA;
    --text: #1A1D24;
    --text-dim: #6B6F78;
    --accent-dim: #7C6FFF22;
  }
  [data-theme="forest"]{
    --bg: #0D1712;
    --surface: #16241D;
    --surface-2: #1D2F26;
    --border: #2A4136;
    --text: #E7F3EC;
    --text-dim: #8FAB9C;
    --accent: #34D399;
    --accent-dim: #34D39933;
    --gold: #FBBF24;
  }
  [data-theme="sunset"]{
    --bg: #1A1210;
    --surface: #261915;
    --surface-2: #33221C;
    --border: #4A3229;
    --text: #FBEDE7;
    --text-dim: #C4A199;
    --accent: #FB923C;
    --accent-dim: #FB923C33;
    --gold: #FBBF24;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; overscroll-behavior-y: none; }
  body{
    margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  #app{ max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;
    padding-bottom: 84px; position:relative; }
  .screen{ padding: 18px 18px 8px; animation: fadeIn .25s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)} }

  /* ---------- Header ---------- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:20px 18px 4px; }
  .brand{ font-size:22px; font-weight:800; letter-spacing:-0.02em; }
  .brand span{ color:var(--accent); }
  .streak-pill{ display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border);
    padding:8px 14px; border-radius:999px; font-weight:700; font-size:14px; }
  .streak-pill.flame{ color:var(--gold); }
  .xp-pill{ font-family:var(--font-mono); font-size:12px; color:var(--text-dim); }

  .greeting{ font-size:26px; font-weight:800; margin:14px 0 2px; letter-spacing:-0.02em; }
  .sub{ color:var(--text-dim); font-size:14px; margin-bottom:18px; }

  /* ---------- Cards / surfaces ---------- */
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:14px; }
  .goal-card{ background:linear-gradient(135deg, var(--accent-dim), transparent); }
  .progress-track{ height:10px; background:var(--surface-2); border-radius:999px; overflow:hidden; margin:10px 0 6px; }
  .progress-fill{ height:100%; background:var(--accent); border-radius:999px; transition:width .4s ease; }
  .row-between{ display:flex; align-items:center; justify-content:space-between; }

  .subject-row{ display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
  .subject-row:last-child{ border-bottom:none; }
  .subject-name{ display:flex; align-items:center; gap:10px; font-weight:600; font-size:15px; }
  .dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .subject-pct{ font-family:var(--font-mono); color:var(--text-dim); font-size:13px; }

  .feedback-banner{ display:flex; gap:10px; align-items:flex-start; background:var(--accent-dim); border:1px solid var(--accent); border-radius:14px; padding:12px 14px; font-size:13.5px; margin-bottom:14px; }

  canvas#accuracyChart{ width:100%; height:120px; display:block; }

  h2.section-title{ font-size:14px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); margin:22px 0 10px; font-weight:700; }

  /* ---------- Buttons ---------- */
  .btn{ border:none; border-radius:14px; padding:14px 18px; font-weight:700; font-size:15px; cursor:pointer; font-family:var(--font-body); transition:transform .12s ease, opacity .12s ease; }
  .btn:active{ transform:scale(.97); }
  .btn-primary{ background:var(--accent); color:#fff; width:100%; }
  .btn-ghost{ background:var(--surface-2); color:var(--text); }
  .btn-outline{ background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-sm{ padding:8px 14px; font-size:13px; border-radius:10px; }
  .btn-block{ width:100%; }
  .icon-btn{ background:var(--surface-2); border:none; width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--text); cursor:pointer; font-size:16px; }

  /* ---------- Bottom nav ---------- */
  .bottomnav{ position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border);
    max-width:520px; margin:0 auto; display:flex; padding: 8px 6px calc(8px + env(safe-area-inset-bottom)); z-index:50; }
  .navbtn{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--text-dim); font-size:10.5px; font-weight:600; padding:6px 0; cursor:pointer; }
  .navbtn.active{ color:var(--accent); }
  .navbtn .navicon{ font-size:20px; }
  .fab{ position:absolute; top:-22px; left:50%; transform:translateX(-50%); width:52px; height:52px; border-radius:50%;
    background:var(--accent); color:#fff; border:4px solid var(--bg); font-size:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 18px var(--accent-dim); }

  /* ---------- Inputs ---------- */
  input[type=text], input[type=number], textarea, select{
    width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    border-radius:12px; padding:12px 14px; font-size:15px; font-family:var(--font-body); margin-bottom:12px;
  }
  textarea{ resize:vertical; min-height:80px; }
  label.field-label{ font-size:12.5px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:6px; }
  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .chip{ padding:7px 13px; border-radius:999px; background:var(--surface-2); border:1px solid var(--border); font-size:13px; cursor:pointer; color:var(--text-dim); font-weight:600; }
  .chip.selected{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .color-swatch{ width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
  .color-swatch.selected{ border-color:var(--text); }

  /* ---------- Study mode ---------- */
  .study-wrap{ display:flex; flex-direction:column; align-items:center; padding-top:6px; }
  .study-progress{ width:100%; display:flex; gap:4px; margin-bottom:16px; }
  .study-progress .seg{ flex:1; height:5px; border-radius:999px; background:var(--surface-2); }
  .study-progress .seg.done{ background:var(--accent); }
  .swipe-card{ width:100%; min-height:340px; background:var(--surface); border:1px solid var(--border); border-radius:24px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:28px;
    position:relative; touch-action:pan-y; user-select:none; cursor:grab; }
  .swipe-card .badge{ position:absolute; top:16px; left:16px; font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; }
  .swipe-card .hint-btn{ position:absolute; top:14px; right:14px; }
  .qtext{ font-size:20px; font-weight:700; line-height:1.4; }
  .atext{ font-size:19px; font-weight:600; line-height:1.4; color:var(--accent); }
  .tap-hint{ margin-top:18px; font-size:12.5px; color:var(--text-dim); }
  .swipe-card img.card-img{ max-width:100%; max-height:140px; border-radius:12px; margin-bottom:14px; object-fit:cover; }
  .stamp{ position:absolute; font-weight:900; font-size:28px; letter-spacing:.05em; border:4px solid; padding:4px 14px; border-radius:10px; transform:rotate(-12deg); opacity:0; pointer-events:none; }
  .stamp.know{ color:var(--green); border-color:var(--green); left:24px; top:40%; }
  .stamp.practice{ color:var(--red); border-color:var(--red); right:24px; top:40%; transform:rotate(12deg); }
  .stamp.priority-up{ color:var(--gold); border-color:var(--gold); top:20px; left:50%; transform:translateX(-50%); }
  .stamp.revision-down{ color:var(--accent); border-color:var(--accent); bottom:60px; left:50%; transform:translateX(-50%); }
  .bottomnav-5 .navbtn{ font-size:9.5px; }
  .bottomnav-5 .navicon{ font-size:17px; }
  .stale-badge{ font-size:10px; color:var(--gold); margin-left:6px; }

  .rating-row{ display:flex; gap:10px; width:100%; margin-top:18px; }
  .rating-btn{ flex:1; padding:13px 6px; border-radius:14px; border:none; font-weight:700; font-size:13.5px; cursor:pointer; color:#fff; }
  .rating-hard{ background:var(--red); }
  .rating-medium{ background:var(--gold); }
  .rating-easy{ background:var(--green); }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--text-dim); }
  .empty-state .big-emoji{ font-size:44px; margin-bottom:10px; }

  /* ---------- Browse ---------- */
  .search-bar{ display:flex; gap:8px; margin-bottom:14px; }
  .filter-bar{ display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:8px; }
  .filter-bar::-webkit-scrollbar{ display:none; }
  .list-card{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; }
  .list-card-top{ display:flex; justify-content:space-between; gap:10px; }
  .list-q{ font-weight:700; font-size:14.5px; margin-bottom:4px; }
  .list-a{ color:var(--text-dim); font-size:13.5px; }
  .tag-mini{ font-size:10.5px; padding:2px 8px; border-radius:999px; background:var(--surface-2); color:var(--text-dim); margin-right:4px; display:inline-block; margin-top:6px; }

  /* ---------- Modal ---------- */
  .modal-overlay{ position:fixed; inset:0; background:#000000aa; z-index:100; display:flex; align-items:flex-end; }
  .modal-sheet{ background:var(--bg); width:100%; max-width:520px; margin:0 auto; border-radius:24px 24px 0 0;
    max-height:92vh; overflow-y:auto; padding:8px 20px 28px; animation: slideUp .25s ease; }
  @keyframes slideUp{ from{transform:translateY(30px); opacity:.4} to{transform:translateY(0); opacity:1} }
  .sheet-handle{ width:40px; height:4px; background:var(--border); border-radius:999px; margin:10px auto 16px; }
  .sheet-title{ font-size:19px; font-weight:800; margin-bottom:16px; }
  .tabbar-inline{ display:flex; gap:8px; margin-bottom:16px; background:var(--surface-2); padding:4px; border-radius:12px; }
  .tabbar-inline button{ flex:1; padding:9px; border:none; background:none; border-radius:9px; font-weight:700; font-size:13px; color:var(--text-dim); cursor:pointer; }
  .tabbar-inline button.active{ background:var(--surface); color:var(--text); }

  .exam-result{ text-align:center; padding:20px 0; }
  .exam-score{ font-size:52px; font-weight:900; color:var(--accent); }
  .timer-badge{ font-family:var(--font-mono); font-weight:700; font-size:14px; background:var(--surface-2); padding:6px 12px; border-radius:999px; }
  ::-webkit-scrollbar{ width:0; height:0; }
  a{ color:var(--accent); }
</style>
</head>
<body data-theme="dark">
<div id="app"></div>

<script>
/* ==================================================================
   RECALL — offline flashcard study app
   Vanilla JS, single file, localStorage persistence.
   ================================================================== */

const STORE_KEYS = { cards:'fc_cards', subjects:'fc_subjects', settings:'fc_settings', stats:'fc_stats' };

const DEFAULT_SUBJECTS = [
  {id:'life-science', name:'Life Sciences', icon:'🧬', color:'#4ADE80', topics:[]},
  {id:'physics', name:'Physics', icon:'⚛️', color:'#60A5FA', topics:[]},
  {id:'maths', name:'Mathematics', icon:'📐', color:'#FFB74D', topics:[]},
  {id:'geography', name:'Geography', icon:'🌍', color:'#F472B6', topics:[]},
  {id:'chemistry', name:'Chemistry', icon:'⚗️', color:'#7C6FFF', topics:[]},
];
const MAX_SUBJECTS = 30;
const MAX_TOPICS_PER_SUBJECT = 25;
const CARD_COLORS = ['#7C6FFF','#4ADE80','#F87171','#FFB74D','#60A5FA','#F472B6','#A78BFA','#34D399','#FB923C','#22D3EE','#E879F9','#A3E635','#FBBF24','#FB7185','#818CF8','#2DD4BF'];
function autoAssignColor(subjectId){
  const subj = state.subjects.find(s=>s.id===subjectId);
  if(subj && subj.color) return subj.color;
  return CARD_COLORS[state.cards.length % CARD_COLORS.length];
}

const DEFAULT_TAGS = ['Hard','Need Revision','Exam Favourite'];

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

function load(key, fallback){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e){ return fallback; }
}
function save(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ console.error('save failed', e); }
}

let state = {
  cards: load(STORE_KEYS.cards, []),
  subjects: load(STORE_KEYS.subjects, DEFAULT_SUBJECTS),
  settings: load(STORE_KEYS.settings, { theme:'dark', name:'there', dailyGoal:20, weeklyGoals:{}, direction:'forward' }),
  stats: load(STORE_KEYS.stats, { streak:0, lastStudyDate:null, xp:0, history:[], freezeAvailable:true, freezeWeekStart:null, reviewLog:[], studyTimeLog:[] }),
  view: 'home',
  studySession: null,
  examSession: null,
  editingCard: null,
  browseFilter: { subject:null, topic:null, tag:null, sort:'recent', query:'' },
};
let lastAction = null; // single-level undo: { type, cardId, snapshot, xpDelta }

function persistAll(){
  save(STORE_KEYS.cards, state.cards);
  save(STORE_KEYS.subjects, state.subjects);
  save(STORE_KEYS.settings, state.settings);
  save(STORE_KEYS.stats, state.stats);
  scheduleRevisionReminder();
}

/* Revision reminders: only runs inside the packaged app (Capacitor), where the
   @capacitor/local-notifications plugin is available. In a plain browser preview
   this silently does nothing — there's no notification API to fall back to.
   Android requires an explicit permission grant (not just declaring it in the
   manifest), so we request it before scheduling — without this, schedule()
   can silently do nothing on modern Android versions. */
function getLocalNotificationsPlugin(){
  return window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications;
}
function scheduleRevisionReminder(){
  try{
    const LN = getLocalNotificationsPlugin();
    if(!LN) return;
    LN.checkPermissions().then(status=>{
      if(status.display !== 'granted'){
        // Don't schedule until the user has actually granted permission —
        // request it once (Settings also has an explicit "Enable" button
        // for anyone who denied it the first time and wants to retry).
        LN.requestPermissions().then(res=>{
          if(res.display === 'granted') doScheduleRevisionReminder(LN);
        }).catch(()=>{});
        return;
      }
      doScheduleRevisionReminder(LN);
    }).catch(()=>{});
  }catch(e){ /* no-op — never let a notification failure break the app */ }
}
function doScheduleRevisionReminder(LN){
  const revisionCount = state.cards.filter(c=>c.revision).length;
  LN.cancel({ notifications: [{ id: 9001 }] }).catch(()=>{});
  if(revisionCount === 0) return;
  LN.schedule({
    notifications: [{
      id: 9001,
      title: 'Recall',
      body: `You have ${revisionCount} card${revisionCount>1?'s':''} marked for revision — quick review?`,
      schedule: { on: { hour: 18, minute: 0 }, repeats: true }
    }]
  }).catch(()=>{});
}
function requestNotificationPermissionManually(){
  const LN = getLocalNotificationsPlugin();
  if(!LN){ alert("Notifications only work in the installed app, not this preview."); return; }
  LN.requestPermissions().then(res=>{
    if(res.display === 'granted'){ alert('Notifications enabled.'); scheduleRevisionReminder(); }
    else alert('Permission was not granted. Check your phone\'s system Settings → Apps → Recall → Notifications.');
  }).catch(()=> alert('Could not request permission.'));
}

/* Photo-scan (OCR): reads text off a photo of a question paper or memo using
   on-device text recognition — works fully offline once installed, no
   internet needed to scan. This only runs inside the packaged app (the
   plugins aren't present in a plain browser preview), and its actual
   scanning accuracy can't be verified without a real camera + real paper,
   so treat this as the most experimental feature in this update. */
async function scanPastPaperPhoto(target){
  const Camera = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Camera;
  const TextRecognition = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.TextRecognition;
  if(!Camera || !TextRecognition){
    alert('Photo scanning only works in the installed app, not this preview. Paste the text instead for now.');
    return;
  }
  try{
    const photo = await Camera.getPhoto({ resultType: 'uri', source: 'PROMPT', quality: 90 });
    const result = await TextRecognition.recognize({ path: photo.path });
    const text = (result && result.blocks ? result.blocks.map(b=>b.text).join('\n') : '') || '';
    if(!text){ alert('No text was detected in that photo — try a clearer, well-lit shot.'); return; }
    const fieldId = target==='a' ? 'fPastPaperA' : 'fPastPaperQ';
    const field = document.getElementById(fieldId);
    if(field) field.value = (field.value ? field.value + '\n' : '') + text;
  }catch(e){
    alert('Could not scan that photo. You can always paste the text in manually instead.');
  }
}

document.body.setAttribute('data-theme', state.settings.theme);

/* ---------------- Spaced repetition ---------------- */
function initSRS(){ return { interval:0, ease:2.5, dueDate: todayStr(), reps:0, lapses:0 }; }

function rateCard(card, rating, skipUndo){
  if(!card.srs) card.srs = initSRS();
  if(!skipUndo){
    lastAction = { type:'rate', cardId: card.id, snapshot: JSON.parse(JSON.stringify({srs:card.srs, difficulty:card.difficulty, reviewCount:card.reviewCount, lastReviewed:card.lastReviewed, revision:card.revision, revisionStreak:card.revisionStreak})), xpDelta:0, historyDate: todayStr() };
  }
  let s = card.srs;
  if(rating === 'hard'){
    s.interval = 1;
    s.ease = Math.max(1.3, s.ease - 0.2);
    s.lapses += 1;
  } else if(rating === 'medium'){
    s.interval = Math.max(1, Math.round((s.interval || 1) * s.ease * 0.6));
    s.reps += 1;
  } else if(rating === 'easy'){
    s.interval = Math.max(2, Math.round((s.interval || 1) * s.ease * 1.3));
    s.ease = s.ease + 0.1;
    s.reps += 1;
  }
  const due = new Date();
  due.setDate(due.getDate() + s.interval);
  s.dueDate = due.toISOString().slice(0,10);
  card.difficulty = rating;
  card.reviewCount = (card.reviewCount||0) + 1;
  card.lastReviewed = todayStr();
  applyRevisionLogic(card, rating);

  const xpGain = rating==='easy' ? 10 : rating==='medium' ? 6 : 3;
  state.stats.xp += xpGain;
  if(!skipUndo) lastAction.xpDelta = xpGain;

  let todayEntry = state.stats.history.find(h=>h.date===todayStr());
  if(!todayEntry){ todayEntry = {date: todayStr(), correct:0, total:0}; state.stats.history.push(todayEntry); }
  todayEntry.total += 1;
  if(rating !== 'hard') todayEntry.correct += 1;
  if(state.stats.history.length > 30) state.stats.history = state.stats.history.slice(-30);

  if(!state.stats.reviewLog) state.stats.reviewLog = [];
  state.stats.reviewLog.push({ date: todayStr(), subject: card.subject });
  if(state.stats.reviewLog.length > 2000) state.stats.reviewLog = state.stats.reviewLog.slice(-2000);
  updateStreak();
  persistAll();
}

/* ---------------- Revision auto-graduation: 4 consecutive non-hard ratings ---------------- */
function applyRevisionLogic(card, rating){
  if(!card.revision) return;
  if(rating === 'hard'){
    card.revisionStreak = 0;
  } else {
    card.revisionStreak = (card.revisionStreak||0) + 1;
    if(card.revisionStreak >= 4){
      card.revision = false;
      card.revisionStreak = 0;
    }
  }
}

function undoLastAction(){
  if(!lastAction) return false;
  const card = state.cards.find(c=>c.id===lastAction.cardId);
  if(card){
    Object.assign(card, lastAction.snapshot);
  }
  state.stats.xp = Math.max(0, state.stats.xp - (lastAction.xpDelta||0));
  const entry = state.stats.history.find(h=>h.date===lastAction.historyDate);
  if(entry && lastAction.xpDelta){
    entry.total = Math.max(0, entry.total-1);
  }
  lastAction = null;
  persistAll();
  return true;
}

function getWeekStart(dateStr){
  const d = new Date(dateStr);
  const day = d.getUTCDay();
  d.setUTCDate(d.getUTCDate() - day);
  return d.toISOString().slice(0,10);
}

function updateStreak(){
  const t = todayStr();
  if(state.stats.lastStudyDate === t) return;
  const weekStart = getWeekStart(t);
  if(state.stats.freezeWeekStart !== weekStart){ state.stats.freezeWeekStart = weekStart; state.stats.freezeAvailable = true; }
  if(state.stats.lastStudyDate){
    const gap = daysBetween(state.stats.lastStudyDate, t);
    if(gap === 1){
      state.stats.streak += 1;
    } else if(gap === 2 && state.stats.freezeAvailable){
      state.stats.streak += 1;
      state.stats.freezeAvailable = false;
    } else {
      state.stats.streak = 1;
    }
  } else {
    state.stats.streak = 1;
  }
  state.stats.lastStudyDate = t;
}

function dueCards(list){
  const t = todayStr();
  return list.filter(c => !c.srs || !c.srs.dueDate || c.srs.dueDate <= t);
}

/* ---------------- Accuracy / weak-spot / staleness ---------------- */
function computeAccuracy(cards){
  const reviewed = cards.filter(c=>c.reviewCount>0);
  if(reviewed.length === 0) return null;
  const good = reviewed.filter(c=>c.difficulty && c.difficulty!=='hard').length;
  return Math.round((good/reviewed.length)*100);
}
function weeklySubjectProgress(subjectId){
  const log = state.stats.reviewLog || [];
  return log.filter(e => e.subject===subjectId && daysBetween(e.date, todayStr()) < 7).length;
}
function weakSubjectIds(){
  return state.subjects.filter(s=>{
    const cards = state.cards.filter(c=>c.subject===s.id);
    const acc = computeAccuracy(cards);
    return acc !== null && cards.filter(c=>c.reviewCount>0).length >= 5 && acc < 60;
  }).map(s=>s.id);
}
function isStale(card){
  const ref = card.lastReviewed || todayStr(new Date(card.createdAt));
  return daysBetween(ref, todayStr()) >= 14;
}

/* ---------------- Past paper: question+memo matching ---------------- */
function parseNumbered(text){
  const lines = (text||'').split(/\r?\n/);
  const map = {};
  let curNum = null;
  // Decimal-style sub-questions (5.1, 12.3) — the embedded dot itself is the
  // signal, so a trailing delimiter is optional (avoids requiring "5.1." which
  // real papers rarely use). Tried first since it's the more specific pattern.
  const decRe = /^\s*(?:q(?:uestion)?\s*)?(\d{1,3}(?:\.\d{1,2}){1,4})(?:\s*[\.\)\:])?\s+(.*)$/i;
  // Plain integers (5., 5), Q5)) — delimiter required so we don't accidentally
  // treat a line like "2 N2O5(g) → ..." (a chemical equation) as question "2".
  const intRe = /^\s*(?:q(?:uestion)?\s*)?(\d{1,3})\s*[\.\)\:]\s*(.*)$/i;
  // A bare section heading like "QUESTION 8" (no period/decimal after it) isn't
  // itself a question — it just means "stop appending to the previous card".
  const headingRe = /^\s*question\s+\d{1,3}\s*(\(|$)/i;
  lines.forEach(line=>{
    if(headingRe.test(line)){ curNum = null; return; }
    const dm = line.match(decRe);
    const m = dm || line.match(intRe);
    if(m){
      curNum = m[1];
      map[curNum] = (m[2]||'').trim();
    } else if(curNum !== null && line.trim()){
      map[curNum] = (map[curNum] ? map[curNum]+' ' : '') + line.trim();
    }
  });
  return map;
}
function compareNumberKeys(a,b){
  const as = a.split('.').map(Number), bs = b.split('.').map(Number);
  for(let i=0; i<Math.max(as.length,bs.length); i++){
    const av = as[i]===undefined ? -1 : as[i];
    const bv = bs[i]===undefined ? -1 : bs[i];
    if(av !== bv) return av - bv;
  }
  return 0;
}
function sortedNumberKeys(map){
  return Object.keys(map).sort(compareNumberKeys);
}
function buildPastPaperCards(questionsText, memoText, onlyList){
  const qMap = parseNumbered(questionsText);
  const aMap = parseNumbered(memoText || '');
  let numbers = sortedNumberKeys(qMap);
  if(onlyList && onlyList.length > 0){
    const wanted = new Set(onlyList.map(n=>n.trim()).filter(Boolean));
    numbers = numbers.filter(n => wanted.has(n));
  }
  return numbers.map(n=>({ question: qMap[n], answer: aMap[n] || '', needsAnswer: !aMap[n] }));
}

function moveArrayItem(arr, id, direction){
  const i = arr.findIndex(x=>x.id===id);
  if(i===-1) return;
  const j = direction==='up' ? i-1 : i+1;
  if(j<0 || j>=arr.length) return;
  const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
}

  function moveTopic(subjectId, topicId, direction){
  const s = state.subjects.find(x=>x.id===subjectId); if(!s || !s.topics) return;

/* ---------------- Import parser ---------------- */
function parseImportText(text){
  const rawLines = text.split(/\r?\n/);
  const nonEmpty = rawLines.map(l=>l.trim()).filter(Boolean);
  if(nonEmpty.length === 0) return [];

  const tabLines = nonEmpty.filter(l=>l.includes('\t'));
  if(tabLines.length / nonEmpty.length > 0.5){
    return nonEmpty.filter(l=>l.includes('\t')).map(l=>{
      const parts = l.split('\t');
      const q = parts[0].trim();
      const a = parts.slice(1).join('\t').trim();
      return {question:q, answer:a};
    }).filter(c=>c.question && c.answer);
  }

  const qRe = /^\s*(q|question)\s*[:.\-\)]\s*/i;
  const aRe = /^\s*(a|answer)\s*[:.\-\)]\s*/i;
  if(rawLines.some(l=>qRe.test(l))){
    const cards = [];
    let cur = null;
    rawLines.forEach(l=>{
      if(qRe.test(l)){
        if(cur && cur.question && cur.answer) cards.push(cur);
        cur = {question: l.replace(qRe,'').trim(), answer:''};
      } else if(aRe.test(l)){
        if(cur) cur.answer = l.replace(aRe,'').trim();
      } else if(l.trim()){
        if(cur && !cur.answer && cur.question) cur.question += ' ' + l.trim();
        else if(cur && cur.answer) cur.answer += ' ' + l.trim();
      }
    });
    if(cur && cur.question && cur.answer) cards.push(cur);
    return cards;
  }

  const blocks = text.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
  const out = [];
  blocks.forEach(b=>{
    const lines = b.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
    if(lines.length >= 2){
      out.push({question: lines[0], answer: lines.slice(1).join(' ')});
    } else if(lines.length === 1 && lines[0].includes('?')){
      // question with no visible answer - skip, needs manual completion
    }
  });
  return out;
}

function subjectMastery(subjectId){
  const cards = state.cards.filter(c=>c.subject===subjectId);
  if(cards.length===0) return 0;
  const scored = cards.reduce((sum,c)=>{
    if(!c.srs || !c.reviewCount) return sum;
    const val = c.difficulty==='easy'?1:c.difficulty==='medium'?0.6:0.25;
    return sum+val;
  },0);
  return Math.round((scored/cards.length)*100);
}

function drawAccuracyChart(){
  const canvas = document.getElementById('accuracyChart');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  const hist = state.stats.history.slice(-28);
  if(hist.length < 1){
    ctx.fillStyle = getCss('--text-dim'); ctx.font='13px sans-serif';
    ctx.fillText('No data yet — study today to begin your graph', 8, h/2);
    return;
  }
  const points = hist.map(d => d.total ? (d.correct/d.total)*100 : 0);
  const max = 100, min = 0;
  const stepX = w / Math.max(1, points.length - 1);
  ctx.strokeStyle = getCss('--accent'); ctx.lineWidth = 2.5; ctx.beginPath();
  points.forEach((p,i)=>{
    const x = i*stepX;
    const y = h - ((p-min)/(max-min))*(h-16) - 8;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.fillStyle = getCss('--accent');
  points.forEach((p,i)=>{
    const x = i*stepX; const y = h - ((p-min)/(max-min))*(h-16) - 8;
    ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fill();
  });
}

        ${card.hint ? `<button class="icon-btn hint-btn" data-action="show-hint" title="Hint">💡</button>` : ''}
        <div class="stamp know" id="stampKnow">KNOW IT</div>
        <div class="stamp practice" id="stampPractice">PRACTICE</div>
        <div class="stamp priority-up" id="stampPriorityUp">${card.priority?'UNPRIORITIZE':'PRIORITY'}</div>
        <div class="stamp revision-down" id="stampRevisionDown">${card.revision?'UNMARK':'REVISION'}</div>
        ${card.image ? `<img class="card-img" src="${card.image}">` : ''}
        ${!s.flipped ? `<div class="qtext">${escapeHtml(pa.prompt)}</div><div class="tap-hint">Tap to flip · swipe ↔ to rate · swipe ↕ for priority/revision</div>`
          : `<div class="atext">${escapeHtml(pa.reveal)}</div>`}
        ${(card.priority||card.revision) ? `<div style="position:absolute; bottom:10px; left:0; right:0; text-align:center; font-size:11px; color:var(--text-dim);">${card.priority?'⭐ Priority ':''}${card.revision?'🔁 Revision':''}</div>` : ''}
      </div>
      ${s.flipped ? `<div class="rating-row">
          <button class="rating-btn rating-hard" data-action="rate" data-val="hard">Hard</button>
          <button class="rating-btn rating-medium" data-action="rate" data-val="medium">Medium</button>
          <button class="rating-btn rating-easy" data-action="rate" data-val="easy">Easy</button>
        </div>` : ''}
    </div>
  </div>`;
  }
  /* Single shared drag-state object + ONE set of window-level listeners bound once
   for the lifetime of the app. attachSwipeHandlers() just re-points drag.el on
   every render instead of re-registering window listeners (avoids a listener
   leak that would make swiping feel laggier the longer a study session runs).
   Horizontal swipe = rate the card (existing). Vertical swipe = toggle
   Priority (up) / Revision (down) and snaps back to the same card — it's a
   tag, not a rating, so the session doesn't advance. */
const drag = { active:false, el:null, startX:0, startY:0, dx:0, dy:0, axis:null, moved:false };

function dragMove(x,y){
  if(!drag.active || !drag.el) return;
  drag.dx = x - drag.startX;
  drag.dy = y - drag.startY;
  if(!drag.axis && (Math.abs(drag.dx) > 8 || Math.abs(drag.dy) > 8)){
    drag.axis = Math.abs(drag.dx) > Math.abs(drag.dy) ? 'x' : 'y';
  }
  if(!drag.axis) return;
  drag.moved = true;
  const know = document.getElementById('stampKnow');
  const practice = document.getElementById('stampPractice');
  const priorityStamp = document.getElementById('stampPriorityUp');
  const revisionStamp = document.getElementById('stampRevisionDown');
  if(drag.axis === 'x'){
    drag.el.style.transform = `translateX(${drag.dx}px) rotate(${drag.dx/20}deg)`;
    if(know) know.style.opacity = Math.max(0, drag.dx/80);
    if(practice) practice.style.opacity = Math.max(0, -drag.dx/80);
  } else {
    drag.el.style.transform = `translateY(${drag.dy}px)`;
    if(priorityStamp) priorityStamp.style.opacity = Math.max(0, -drag.dy/80);
    if(revisionStamp) revisionStamp.style.opacity = Math.max(0, drag.dy/80);
  }
}
function dragEnd(){
  if(!drag.active || !drag.el) return;
  drag.active = false;
  const el = drag.el;
  el.style.transition = 'transform .25s ease';
  if(drag.axis === 'x'){
    if(drag.dx > 90){
      el.style.transform = `translateX(600px) rotate(20deg)`;
      setTimeout(()=>quickRate('easy'), 180);
    } else if(drag.dx < -90){
      el.style.transform = `translateX(-600px) rotate(-20deg)`;
      setTimeout(()=>quickRate('hard'), 180);
    } else {
      el.style.transform = 'translateX(0) rotate(0)';
    }
  } else if(drag.axis === 'y'){
    if(drag.dy < -70){
      el.style.transform = 'translateY(0)';
      toggleCurrentCardFlag('priority');
    } else if(drag.dy > 70){
      el.style.transform = 'translateY(0)';
      toggleCurrentCardFlag('revision');
    } else {
      el.style.transform = 'translateY(0)';
    }
  }
  const know = document.getElementById('stampKnow');
  const practice = document.getElementById('stampPractice');
  const priorityStamp = document.getElementById('stampPriorityUp');
  const revisionStamp = document.getElementById('stampRevisionDown');
  if(know) know.style.opacity=0; if(practice) practice.style.opacity=0;
  if(priorityStamp) priorityStamp.style.opacity=0; if(revisionStamp) revisionStamp.style.opacity=0;
  drag.dx = 0; drag.dy = 0; drag.axis = null;
}
function toggleCurrentCardFlag(flagKey){
  const s = state.studySession; if(!s) return;
  const card = state.cards.find(c=>c.id===s.ids[s.index]);
  if(!card) return;
  card[flagKey] = !card[flagKey];
  if(flagKey==='revision' && card.revision) card.revisionStreak = 0;
  persistAll();
  render();
}
// Bound exactly once, ever.
window.addEventListener('mousemove', e=> dragMove(e.clientX, e.clientY));
window.addEventListener('mouseup', dragEnd);

function attachSwipeHandlers(){
  const el = document.getElementById('swipeCard');
  if(!el) return;
  drag.el = el; drag.active = false; drag.dx = 0; drag.dy = 0; drag.axis = null; drag.moved = false;

  el.addEventListener('touchstart', e=>{ drag.active=true; drag.moved=false; drag.axis=null; drag.startX=e.touches[0].clientX; drag.startY=e.touches[0].clientY; el.style.transition='none'; }, {passive:true});
  el.addEventListener('touchmove', e=>{
    dragMove(e.touches[0].clientX, e.touches[0].clientY);
    if(Math.abs(drag.dx) > 10 || Math.abs(drag.dy) > 10) e.preventDefault();
  }, {passive:false});
  el.addEventListener('touchend', dragEnd);
  el.addEventListener('mousedown', e=>{ drag.active=true; drag.moved=false; drag.axis=null; drag.startX=e.clientX; drag.startY=e.clientY; el.style.transition='none'; });
  el.addEventListener('click', ()=>{
    if(drag.moved) return;
    flipCard();
  });
}

function flipCard(){
  const s = state.studySession; if(!s) return;
  s.flipped = !s.flipped;
  render();
}
function quickRate(rating){
  const s = state.studySession; if(!s) return;
  const card = state.cards.find(c=>c.id===s.ids[s.index]);
  rateCard(card, s.flipped ? rating : rating); // if not flipped yet (swipe before flip), still rate
  const elapsed = (Date.now() - (s.cardShownAt||Date.now())) / 1000;
  s.times.push(elapsed);
  logStudyTime(elapsed);
  s.cardShownAt = Date.now();
  s.results.push(rating);
  s.index += 1;
  s.flipped = false;
  render();
}

  let examTimerInterval = null;
function beginExam(){
  const subjectId = document.getElementById('examSubject').value;
  const count = parseInt(document.getElementById('examCount').value)||10;
  const perQ = parseInt(document.getElementById('examTimer').value)||20;
  const priorityOnly = document.getElementById('examPriorityOnly').checked;
  const cramMode = document.getElementById('examCramMode').checked;
  const direction = document.getElementById('examDirection').value;
  let pool = state.cards.filter(c=> (!subjectId || c.subject===subjectId) && (!priorityOnly || c.priority));
  if(cramMode) pool = pool.filter(c=> c.priority || c.difficulty==='hard');
  pool = shuffle([...pool]).slice(0, count);
  if(pool.length===0){ alert('No cards match those filters yet.'); return; }
  const cardDirection = {};
  pool.forEach(c=>{ cardDirection[c.id] = direction==='mixed' ? (Math.random()<0.5?'forward':'reverse') : direction; });
  state.examSession = { cards: pool, index:0, revealed:false, score:0, perQ, timeLeft: perQ, cardDirection, times:[], cardShownAt: Date.now() };
  state.view = 'examSession';
  render();
  startExamTimer();
}
function startExamTimer(){
  clearInterval(examTimerInterval);
  examTimerInterval = setInterval(()=>{
    const s = state.examSession; if(!s || s.revealed){ return; }
    s.timeLeft -= 1;
    const badge = document.getElementById('examTimerBadge');
    if(badge) badge.textContent = s.timeLeft+'s';
    if(s.timeLeft <= 0){ s.revealed = true; render(); }
  }, 1000);
}
function nextExamQuestion(){
  const s = state.examSession;
  const elapsed = (Date.now() - (s.cardShownAt||Date.now())) / 1000;
  s.times.push(elapsed);
  logStudyTime(elapsed);
  s.index += 1; s.revealed = false; s.timeLeft = s.perQ; s.cardShownAt = Date.now();
  if(s.index >= s.cards.length){
    clearInterval(examTimerInterval);
    state.view = 'examResult';
  }
  render();
  if(state.view==='examSession') startExamTimer();
}

/* ---------------- Event handling ---------------- */
function attachGlobalHandlers(){
  app.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', handleAction);
  });
}
function attachModalHandlers(){
  document.querySelectorAll('#modalRoot [data-action]').forEach(el=>{
    el.addEventListener('click', handleAction);
  });
  document.querySelectorAll('#fTags .chip').forEach(el=>{
    el.addEventListener('click', ()=> el.classList.toggle('selected'));
  });
  document.querySelectorAll('#fColorRow .color-swatch').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.querySelectorAll('#fColorRow .color-swatch').forEach(x=>x.classList.remove('selected'));
      el.classList.add('selected');
    });
  });
}

function handleAction(e){
  const el = e.currentTarget;
  const action = el.dataset.action;
  const val = el.dataset.val;

  if(action==='nav'){ state.view = val; state.studySession=null; render(); return; }
  if(action==='go-home'){ state.view='home'; state.studySession=null; state.examSession=null; render(); return; }
  if(action==='open-add'){ modalState='add'; window._addTab='manual'; state.editingCard=null; render(); return; }
  if(action==='open-settings'){ modalState='settings'; render(); return; }
  if(action==='close-modal'){ modalState=null; state.editingCard=null; render(); return; }
  if(action==='add-tab'){ window._addTab = val; render(); return; }

  if(action==='save-new'){ saveNewCard(); return; }
  if(action==='save-edit'){ saveEditCard(val); return; }
  if(action==='edit-card'){ state.editingCard = state.cards.find(c=>c.id===val); modalState='add'; render(); return; }
  if(action==='delete-card'){
    if(confirm('Delete this card?')){ state.cards = state.cards.filter(c=>c.id!==val); persistAll(); render(); }
    return;
    }
  if(action==='preview-import'){ previewImport(); return; }
  if(action==='confirm-import'){ confirmImport(); return; }

  if(action==='filter-subject'){ state.browseFilter.subject = val||null; render(); return; }
  if(action==='filter-topic'){ state.browseFilter.topic = val||null; render(); return; }
  if(action==='filter-tag'){ state.browseFilter.tag = val||null; render(); return; }

  if(action==='study-scope'){
    const flagKey = val;
    startStudySession(state.cards.filter(c=>c[flagKey] && (!state.browseFilter.subject || c.subject===state.browseFilter.subject)).map(c=>c.id));
    return;
  }
  if(action==='start-due-study'){ startStudySession(dueCards(state.cards).map(c=>c.id)); return; }
  if(action==='open-start-picker'){ modalState='startPicker'; render(); return; }
  if(action==='start-scope-all'){ modalState=null; startStudySession(dueCards(state.cards).map(c=>c.id)); return; }
  if(action==='start-scope-subject'){
    modalState=null;
    startStudySession(dueCards(state.cards.filter(c=>c.subject===val)).map(c=>c.id));
    return;
  }
  if(action==='toggle-start-topics'){
    window._startPickerExpanded = (window._startPickerExpanded===val) ? null : val;
    render();
    return;
  }
  if(action==='start-scope-topic'){
    const [subjId, topicId] = val.split('|');
    modalState=null;
    startStudySession(dueCards(state.cards.filter(c=>c.subject===subjId && c.topic===topicId)).map(c=>c.id));
    return;
  }
  if(action==='start-cram'){
    modalState=null;
    startStudySession(state.cards.filter(c=>c.priority || c.difficulty==='hard').map(c=>c.id));
    return;
  }
  if(action==='exit-study'){ state.view='home'; state.studySession=null; render(); return; }
  if(action==='show-hint'){ const s=state.studySession; const card=state.cards.find(c=>c.id===s.ids[s.index]); if(card.hint) alert('Hint: '+card.hint); return; }
  if(action==='rate'){
    const s=state.studySession; const card=state.cards.find(c=>c.id===s.ids[s.index]);
    rateCard(card,val);
    const elapsed = (Date.now() - (s.cardShownAt||Date.now())) / 1000;
    s.times.push(elapsed); logStudyTime(elapsed); s.cardShownAt = Date.now();
    s.results.push(val); s.index+=1; s.flipped=false; persistAll(); render(); return;
  }
  if(action==='undo-swipe'){ undoLastAction(); const s=state.studySession; if(s && s.index>0){ s.index-=1; s.results.pop(); } render(); return; }
  if(action==='toggle-priority'){ const c=state.cards.find(x=>x.id===val); if(c){ c.priority=!c.priority; persistAll(); } render(); return; }
  if(action==='toggle-revision'){ const c=state.cards.find(x=>x.id===val); if(c){ c.revision=!c.revision; if(c.revision) c.revisionStreak=0; persistAll(); } render(); return; }

  if(action==='export-scope'){
    let cards = [...state.cards];
    const f = state.browseFilter;
    if(f.subject) cards = cards.filter(c=>c.subject===f.subject);
    if(f.topic) cards = cards.filter(c=>c.topic===f.topic);
    const subj = state.subjects.find(s=>s.id===f.subject);
    exportCardsAsText(cards, subj ? subj.name.replace(/\s+/g,'-') : 'recall-export');
    return;
  }
  if(action==='quick-add-here'){
    modalState='add'; window._addTab='manual'; state.editingCard=null;
    window._quickAddSubject = state.browseFilter.subject || (state.subjects[0] && state.subjects[0].id);
    window._quickAddTopic = state.browseFilter.topic || null;
    render();
    return;
  }
  if(action==='toggle-bulk-mode'){ window._bulkMode = !window._bulkMode; window._bulkSelected = []; render(); return; }
  if(action==='toggle-bulk-select'){
    window._bulkSelected = window._bulkSelected || [];
    const idx = window._bulkSelected.indexOf(val);
    if(idx===-1) window._bulkSelected.push(val); else window._bulkSelected.splice(idx,1);
    render();
    return;
  }
  if(action==='bulk-delete'){
    const ids = window._bulkSelected || [];
    if(ids.length===0) return;
    if(confirm(`Delete ${ids.length} card${ids.length>1?'s':''}? This can't be undone.`)){
      state.cards = state.cards.filter(c=>!ids.includes(c.id));
      window._bulkSelected = []; window._bulkMode = false;
      persistAll();
    }
    render();
    return;
  }
  if(action==='bulk-tag'){
    const ids = window._bulkSelected || [];
    if(ids.length===0) return;
    const tag = prompt('Add tag to selected cards:');
    if(tag){
      state.cards.forEach(c=>{ if(ids.includes(c.id)){ c.tags = c.tags||[]; if(!c.tags.includes(tag)) c.tags.push(tag); } });
      persistAll();
    }
    render();
    return;
  }
  if(action==='bulk-move'){
    if((window._bulkSelected||[]).length===0) return;
    modalState = 'bulkMove';
    render();
    return;
  }
  if(action==='apply-bulk-move'){
    const subject = document.getElementById('bulkMoveSubject').value;
    const topicEl = document.getElementById('bulkMoveTopic');
    const topic = topicEl ? (topicEl.value || null) : null;
    const ids = window._bulkSelected || [];
    state.cards.forEach(c=>{ if(ids.includes(c.id)){ c.subject = subject; c.topic = topic; } });
    persistAll();
    window._bulkSelected = []; window._bulkMode = false;
    modalState = null;
    state.view = 'browse';
    render();
    return;
  }

  if(action==='manage-subjects'){ modalState='manageSubjects'; render(); return; }
  if(action==='add-subject'){
    const name = prompt('New subject name:');
    if(name) addSubject(name);
    render();
    return;
  }
  if(action==='rename-subject'){
    const s = state.subjects.find(x=>x.id===val);
    const name = prompt('Rename subject:', s?s.name:'');
    if(name) renameSubject(val, name);
    render();
    return;
  }
  if(action==='delete-subject'){
    if(confirm('Delete this subject? Its cards will be unassigned, not deleted.')) deleteSubject(val);
    render();
    return;
  }
  if(action==='move-subject-up'){ moveSubject(val,'up'); render(); return; }
  if(action==='move-subject-down'){ moveSubject(val,'down'); render(); return; }
  if(action==='manage-topics'){ window._manageTopicsSubject = val; modalState='manageTopics'; render(); return; }
  if(action==='add-topic'){
    const name = prompt('New topic name:');
    if(name) addTopic(window._manageTopicsSubject, name);
    render();
    return;
  }
  if(action==='rename-topic'){
    const name = prompt('Rename topic:');
    if(name) renameTopic(window._manageTopicsSubject, val, name);
    render();
    return;
  }
  if(action==='delete-topic'){
    if(confirm('Delete this topic?')) deleteTopic(window._manageTopicsSubject, val);
    render();
    return;
  }
  if(action==='move-topic-up'){ moveTopic(window._manageTopicsSubject, val, 'up'); render(); return; }
  if(action==='move-topic-down'){ moveTopic(window._manageTopicsSubject, val, 'down'); render(); return; }
  if(action==='past-paper-toggle'){ window._pastPaperMode = !window._pastPaperMode; render(); return; }
  if(action==='scan-past-paper'){ scanPastPaperPhoto(val); return; }
  if(action==='preview-past-paper'){ previewPastPaper(); return; }

  if(action==='begin-exam'){ beginExam(); return; }
  if(action==='exit-exam'){ clearInterval(examTimerInterval); state.view='home'; state.examSession=null; render(); return; }
  if(action==='reveal-exam'){ state.examSession.revealed = true; render(); return; }
  if(action==='exam-mark'){
    if(val==='right') state.examSession.score += 1;
    nextExamQuestion();
    return;
  }

  if(action==='set-theme'){ state.settings.theme = val; document.body.setAttribute('data-theme', val); render(); return; }
  if(action==='save-settings'){ saveSettings(); return; }
  if(action==='export-data'){ exportData(); return; }
  if(action==='enable-notifications'){ requestNotificationPermissionManually(); return; }
}

function onSearchInput(v){ state.browseFilter.query = v; render(); var _si = document.querySelector('.search-bar input'); if(_si) _si.focus(); }
function onSortChange(v){ state.browseFilter.sort = v; render(); }

function readImageInput(inputEl){
  return new Promise(resolve=>{
    const file = inputEl.files && inputEl.files[0];
    if(!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.readAsDataURL(file);
    });
}

async function saveNewCard(){
  const q = document.getElementById('fQuestion').value.trim();
  const a = document.getElementById('fAnswer').value.trim();
  if(!q || !a){ alert('Please fill in both question and answer.'); return; }
  const hint = document.getElementById('fHint').value.trim();
  const subject = document.getElementById('fSubject').value;
  const topicEl = document.getElementById('fTopic');
  const topic = topicEl ? (topicEl.value || null) : null;
  const priority = document.getElementById('fPriority').checked;
  const revision = document.getElementById('fRevision').checked;
  const colorEl = document.querySelector('#fColorRow .color-swatch.selected');
  const color = (colorEl && colorEl.dataset.color) ? colorEl.dataset.color : autoAssignColor(subject);
  const tags = [...document.querySelectorAll('#fTags .chip.selected')].map(c=>c.dataset.tag);
  const image = await readImageInput(document.getElementById('fImage'));
  if(findDuplicate(q, subject) && !confirm('A very similar card already exists in this subject. Add it anyway?')) return;
  state.cards.push({
    id: uid(), question:q, answer:a, hint, subject, topic, tags, priority, revision, revisionStreak:0, color, image: image||null,
    createdAt: Date.now(), reviewCount:0, difficulty:null, srs: initSRS()
  });
  persistAll();
  window._quickAddSubject = null; window._quickAddTopic = null;
  modalState = null; state.view='browse'; render();
}

function normalizeQuestionText(text){ return (text||'').trim().toLowerCase().replace(/\s+/g,' '); }
function findDuplicate(question, subjectId){
  const norm = normalizeQuestionText(question);
  if(!norm) return null;
  return state.cards.find(c => c.subject===subjectId && normalizeQuestionText(c.question)===norm) || null;
}

async function saveEditCard(id){
  const c = state.cards.find(x=>x.id===id);
  if(!c) return;
  c.question = document.getElementById('fQuestion').value.trim();
  c.answer = document.getElementById('fAnswer').value.trim();
  c.hint = document.getElementById('fHint').value.trim();
  c.subject = document.getElementById('fSubject').value;
  const topicEl = document.getElementById('fTopic');
  c.topic = topicEl ? (topicEl.value || null) : null;
  c.priority = document.getElementById('fPriority').checked;
  c.revision = document.getElementById('fRevision').checked;
  if(!c.revision) c.revisionStreak = 0;
  const colorEl = document.querySelector('#fColorRow .color-swatch.selected');
  c.color = (colorEl && colorEl.dataset.color) ? colorEl.dataset.color : (c.color || autoAssignColor(c.subject));
  c.tags = [...document.querySelectorAll('#fTags .chip.selected')].map(x=>x.dataset.tag);
  const newImage = await readImageInput(document.getElementById('fImage'));
  if(newImage) c.image = newImage;
  persistAll();
  modalState = null; state.editingCard = null; render();
}

let lastPreviewedCards = [];
function previewImport(){
  const text = document.getElementById('fImportText').value;
  const subject = document.getElementById('fImportSubject').value;
  const cards = parseImportText(text);
  cards.forEach(c=>{ c.isDuplicate = !!findDuplicate(c.question, subject); });
  lastPreviewedCards = cards;
  const box = document.getElementById('importPreview');
  if(cards.length===0){
    box.innerHTML = `<div class="feedback-banner">Couldn't detect card pairs. Try one per line as <em>question&nbsp;&#8594;TAB&#8594;&nbsp;answer</em>, or use Q: / A: labels.</div>`;
    return;
  }
  const dupeCount = cards.filter(c=>c.isDuplicate).length;
  box.innerHTML = `<div class="feedback-banner">Found ${cards.length} card${cards.length>1?'s':''} ✅ ${dupeCount>0?`(⚠️ ${dupeCount} look like possible duplicates)`:''}</div>
    ${cards.slice(0,6).map(c=>`<div class="list-card"><div class="list-q">${escapeHtml(c.question)}${c.isDuplicate?' <span class="stale-badge">⚠️ possible duplicate</span>':''}</div><div class="list-a">${escapeHtml(c.answer)}</div></div>`).join('')}
    ${cards.length>6 ? `<div class="sub">+ ${cards.length-6} more...</div>` : ''}
    <button class="btn btn-primary btn-block" style="margin-top:10px;" data-action="confirm-import">Import ${cards.length} card${cards.length>1?'s':''}</button>`;
  document.querySelector('[data-action="confirm-import"]').addEventListener('click', handleAction);
}
function confirmImport(){
  const subject = document.getElementById('fImportSubject').value;
  const topicEl = document.getElementById('fImportTopic');
  const topic = topicEl ? (topicEl.value || null) : null;
  lastPreviewedCards.forEach(c=>{
    state.cards.push({
      id: uid(), question:c.question, answer:c.answer, hint:'', subject, topic, tags:[], priority:false, revision:false, revisionStreak:0, color:autoAssignColor(subject), image:null,
      createdAt: Date.now()+Math.random(), reviewCount:0, difficulty:null, srs: initSRS()
    });
  });
  persistAll();
  lastPreviewedCards = [];
  modalState = null; state.view='browse'; render();
}

function previewPastPaper(){
  const qText = document.getElementById('fPastPaperQ').value;
  const aText = document.getElementById('fPastPaperA').value;
  const onlyRaw = (document.getElementById('fPastPaperOnly').value || '').trim();
  const onlyList = onlyRaw ? onlyRaw.split(',').map(s=>s.trim()).filter(Boolean) : null;
  const subject = document.getElementById('fImportSubject').value;
  const cards = buildPastPaperCards(qText, aText, onlyList);
  cards.forEach(c=>{ c.isDuplicate = !!findDuplicate(c.question, subject); });
  lastPreviewedCards = cards;
  const box = document.getElementById('importPreview');
  if(cards.length===0){
    box.innerHTML = `<div class="feedback-banner">${onlyList ? "None of those question numbers were found — check the numbers match what's in the pasted paper." : 'Couldn\'t detect numbered questions. Try "1. ..." or "Q1) ..." style numbering.'}</div>`;
    return;
  }
  const missingCount = cards.filter(c=>c.needsAnswer).length;
  const dupeCount = cards.filter(c=>c.isDuplicate).length;
  box.innerHTML = `<div class="feedback-banner">Found ${cards.length} question${cards.length>1?'s':''} ✅ ${missingCount>0?`(${missingCount} still need answers)`:''} ${dupeCount>0?`(⚠️ ${dupeCount} possible duplicates)`:''}</div>
    ${cards.slice(0,6).map(c=>`<div class="list-card"><div class="list-q">${escapeHtml(c.question)}${c.isDuplicate?' <span class="stale-badge">⚠️ duplicate</span>':''}</div><div class="list-a">${c.answer?escapeHtml(c.answer):'<em>No answer yet</em>'}</div></div>`).join('')}
    ${cards.length>6 ? `<div class="sub">+ ${cards.length-6} more...</div>` : ''}
    <button class="btn btn-primary btn-block" style="margin-top:10px;" data-action="confirm-import">Import ${cards.length} card${cards.length>1?'s':''}</button>`;
  document.querySelector('[data-action="confirm-import"]').addEventListener('click', handleAction);
}

function saveSettings(){
  state.settings.name = document.getElementById('setName').value.trim() || 'there';
  state.settings.direction = document.getElementById('setDirection').value;
  document.querySelectorAll('.weekly-goal-input').forEach(inp=>{
    const val = parseInt(inp.value)||0;
    if(val > 0) state.settings.weeklyGoals[inp.dataset.subject] = val;
    else delete state.settings.weeklyGoals[inp.dataset.subject];
  });
  persistAll();
  modalState = null; render();
}
function exportData(){
  const blob = new Blob([JSON.stringify({cards:state.cards, subjects:state.subjects, stats:state.stats, settings:state.settings}, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'recall-backup.json'; a.click();
}

function restoreData(inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data || !Array.isArray(data.cards) || !Array.isArray(data.subjects)){
        alert('That file doesn\'t look like a valid Recall backup.');
        return;
      }
      if(!confirm(`This will replace your current data with the backup (${data.cards.length} cards, ${data.subjects.length} subjects). Continue?`)) return;
      state.cards = data.cards;
      state.subjects = data.subjects;
      if(data.stats) state.stats = Object.assign({ streak:0, lastStudyDate:null, xp:0, history:[], freezeAvailable:true, freezeWeekStart:null, reviewLog:[], studyTimeLog:[] }, data.stats);
      if(data.settings) state.settings = Object.assign({ theme:'dark', name:'there', dailyGoal:20, weeklyGoals:{}, direction:'forward' }, data.settings);
      persistAll();
      modalState = null;
      state.view = 'home';
      render();
      alert('Backup restored successfully.');
    }catch(e){
      alert('Could not read that file — make sure it\'s an unedited Recall backup export.');
    }
  };
  reader.readAsText(file);
}

/* ---------------- Utils ---------------- */
function escapeHtml(str){
  return String(str===null || str===undefined ? '' : str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

window.addEventListener('error', function(e){
  var el = document.getElementById('app');
  if(el && !el.dataset.crashed){
    el.dataset.crashed = '1';
    el.innerHTML = '<div style="padding:24px; color:#fff; font-family:monospace; font-size:13px; white-space:pre-wrap;">'
      + 'Something went wrong loading Recall.\n\nError: ' + (e.message||'unknown') + '\nLine: ' + (e.lineno||'?')
      + '\n\nScreenshot this and send it back so it can be fixed.</div>';
  }
});

try{
  render();
}catch(e){
  var el = document.getElementById('app');
  if(el){
    el.innerHTML = '<div style="padding:24px; color:#fff; font-family:monospace; font-size:13px; white-space:pre-wrap;">'
      + 'Something went wrong loading Recall.\n\nError: ' + (e.message||e) + '\n\nScreenshot this and send it back so it can be fixed.</div>';
  }
}
</script>
